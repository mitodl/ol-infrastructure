config:
  # Path to the kubeconfig for the k3d cluster.
  # Defaults to ${HOME}/.kube/config if not set.
  ol-local-dev-infra:kubeconfig: ""

  # Path to the mkcert-generated TLS certificate and key.
  ol-local-dev-infra:tls_cert_path: "local-dev/certs/local-dev.pem"
  ol-local-dev-infra:tls_key_path: "local-dev/certs/local-dev-key.pem"
  ol-local-dev-infra:mkcert_ca_cert_path: "local-dev/certs/rootCA.pem"

  # Domain configuration
  ol-local-dev-infra:keycloak_hostname: "sso.ol.mit.dev"
  ol-local-dev-infra:keycloak_url: "https://sso.ol.mit.dev"

  # OIDC client secrets for local dev (plaintext, never commit real secrets)
  # These are default local-only values; override in your local tilt_config.json
  ol-local-dev-infra:mitlearn_client_secret:
    secure: false
    value: "local-dev-mitlearn-secret"
  ol-local-dev-infra:learn_ai_client_secret:
    secure: false
    value: "local-dev-learn-ai-secret"
  ol-local-dev-infra:mitxonline_client_secret:
    secure: false
    value: "local-dev-mitxonline-secret"
  ol-local-dev-infra:unified_ecommerce_client_secret:
    secure: false
    value: "local-dev-unified-ecommerce-secret"
  ol-local-dev-infra:apisix_admin_key:
    secure: false
    value: "local-dev-apisix-admin-key"
  ol-local-dev-infra:apisix_viewer_key:
    secure: false
    value: "local-dev-apisix-viewer-key"
  ol-local-dev-infra:apisix_oidc_session_secret:
    secure: false
    value: "local-dev-apisix-oidc-session-secret"

  # Helm chart versions
  ol-local-dev-infra:cert_manager_version: "v1.16.2"
  ol-local-dev-infra:cnpg_version: "0.23.0"
  ol-local-dev-infra:apisix_version: "2.12.0"
  ol-local-dev-infra:keycloak_operator_version: "26.0.7"
