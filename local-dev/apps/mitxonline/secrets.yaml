---
apiVersion: v1
kind: Secret
metadata:
  name: mitxonline-secrets
  namespace: mitxonline
type: Opaque
stringData:
  SECRET_KEY: "local-dev-mitxonline-insecure-secret-key"  # pragma: allowlist secret
  DATABASE_URL: "postgres://app:localdev@local-pg-rw.local-infra.svc.cluster.local:5432/mitxonline"  # pragma: allowlist secret
  # OIDC client secret — must match value in ol-mitxonline-oidc Secret (created by Pulumi)
  KEYCLOAK_CLIENT_ID: "ol-mitxonline-client"
  KEYCLOAK_CLIENT_SECRET: "local-dev-mitxonline-secret"  # pragma: allowlist secret
  # Admin Keycloak client (for user management APIs)
  KEYCLOAK_ADMIN_CLIENT_ID: "ol-mitxonline-client"
  KEYCLOAK_ADMIN_CLIENT_SECRET: "local-dev-mitxonline-secret"  # pragma: allowlist secret
  # OpenEdX stub token (degraded mode)
  OPENEDX_SERVICE_WORKER_API_TOKEN: "local-dev-stub-token"
