---
# nginx config for the mitxonline webapp sidecar.
# mitxonline uses uwsgi (not granian); uwsgi listens on a Unix socket.
# For local dev simplicity, we run uwsgi with HTTP (--http-socket) on port 8011.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mitxonline-nginx-conf
  namespace: mitxonline
data:
  default.conf: |
    server {
        listen 8010 default_server;
        server_name _;

        gzip on;
        gzip_comp_level 2;
        gzip_min_length 512;

        location = /.well-known/dnt-policy.txt {
            return 204;
        }

        location /static/ {
            alias /src/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
            proxy_pass http://127.0.0.1:8011;
            proxy_redirect off;
            client_max_body_size 25M;
        }
    }
