---
# nginx config for the learn-ai webapp sidecar.
# Serves static files directly and proxies all other requests to granian (port 8001).
apiVersion: v1
kind: ConfigMap
metadata:
  name: learnai-nginx-conf
  namespace: learn-ai
data:
  default.conf: |
    server {
        listen 8000 default_server;
        server_name _;

        gzip on;
        gzip_comp_level 2;
        gzip_min_length 512;

        location = /.well-known/dnt-policy.txt {
            return 204;
        }

        location /static/ {
            alias /src/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
            # learn-ai uses granian on port 8001
            proxy_pass http://127.0.0.1:8001;
            proxy_redirect off;
            client_max_body_size 25M;
            # WebSocket support (learn-ai uses channels/ws)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
