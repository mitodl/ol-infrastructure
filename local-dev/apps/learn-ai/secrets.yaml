---
# Placeholder secrets for learn-ai.
# DATABASE_URL is written by the CNPG cluster via Pulumi.
# OIDC secret (ol-learn-ai-oidc) is created by Pulumi keycloak module.
# Add other non-OIDC, non-DB secrets here.
apiVersion: v1
kind: Secret
metadata:
  name: learn-ai-secrets
  namespace: learn-ai
type: Opaque
stringData:
  SECRET_KEY: "local-dev-learn-ai-insecure-secret-key"  # pragma: allowlist secret
  DATABASE_URL: "postgres://app:localdev@local-pg-rw.local-infra.svc.cluster.local:5432/learnai"  # pragma: allowlist secret
  # OIDC client secret (must match value in ol-learn-ai-oidc Secret created by Pulumi)
  KEYCLOAK_CLIENT_ID: "ol-learn-ai-client"
  KEYCLOAK_CLIENT_SECRET: "local-dev-learn-ai-client-secret"  # pragma: allowlist secret
  # AI proxy token (LiteLLM master key from infra stack)
  AI_PROXY_AUTH_TOKEN: "local-dev-litellm-master-key"  # pragma: allowlist secret
