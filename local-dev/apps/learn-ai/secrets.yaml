---
# Placeholder secrets for learn-ai.
# All values here are local-only defaults. Override by editing this file or
# providing secrets via a secrets manager for non-local environments.
# OIDC secret (ol-learn-ai-oidc) is created by the Pulumi infra stack.
apiVersion: v1
kind: Secret
metadata:
  name: learn-ai-secrets
  namespace: learn-ai
type: Opaque
stringData:
  SECRET_KEY: "local-dev-learn-ai-insecure-secret-key"  # pragma: allowlist secret
  DATABASE_URL: "postgres://app:localdev@local-pg-rw.local-infra.svc.cluster.local:5432/learnai"  # pragma: allowlist secret
  # OIDC client secret (must match value in ol-learn-ai-oidc Secret created by Pulumi)
  KEYCLOAK_CLIENT_ID: "ol-learn-ai-client"
  KEYCLOAK_CLIENT_SECRET: "local-dev-learn-ai-secret"  # pragma: allowlist secret
  # AI proxy token (LiteLLM master key from infra stack)
  AI_PROXY_AUTH_TOKEN: "local-dev-litellm-master-key"  # pragma: allowlist secret
  # Mailgun key is required unconditionally by settings.py. Stub value —
  # Mailpit handles all email in local dev, Mailgun is never called.
  MAILGUN_KEY: "local-dev-mailgun-stub"  # pragma: allowlist secret
