---
# APISIX OIDC plugin config shared across learn-ai routes
apiVersion: apisix.apache.org/v2
kind: ApisixPluginConfig
metadata:
  name: learnai-oidc-config
  namespace: learn-ai
spec:
  plugins:
    - name: openid-connect
      enable: true
      config:
        client_id: "ol-learn-ai-client"
        client_secret: "local-dev-learn-ai-client-secret"
        discovery: "https://sso.ol.mit.dev/realms/olapps/.well-known/openid-configuration"
        scope: "openid profile email"
        redirect_uri: "https://ai.learn.mit.dev/oidc/callback"
        logout_path: "/logout"
        post_logout_redirect_uri: "/"
        session:
          secret: "local-dev-learnai-oidc-session-32c!"
        ssl_verify: false
---
# TLS secret reference for ai.learn.mit.dev
apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: learnai-tls
  namespace: learn-ai
spec:
  hosts:
    - "ai.learn.mit.dev"
  secret:
    name: local-dev-tls
    namespace: learn-ai
---
# ApisixRoute: all routes for ai.learn.mit.dev
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: learnai-route
  namespace: learn-ai
spec:
  http:
    - name: public
      match:
        hosts:
          - "ai.learn.mit.dev"
        paths:
          - "/*"
      backends:
        - serviceName: learnai-webapp
          servicePort: 8000
      plugins:
        - name: openid-connect
          enable: true
          config:
            client_id: "ol-learn-ai-client"
            client_secret: "local-dev-learn-ai-client-secret"
            discovery: "https://sso.ol.mit.dev/realms/olapps/.well-known/openid-configuration"
            scope: "openid profile email"
            redirect_uri: "https://ai.learn.mit.dev/oidc/callback"
            logout_path: "/logout"
            post_logout_redirect_uri: "/"
            unauth_action: "pass"
            session:
              secret: "local-dev-learnai-oidc-session-32c!"
            ssl_verify: false
