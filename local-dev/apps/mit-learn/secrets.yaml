---
# Placeholder Secrets for mit-learn.
# These contain the actual secret values that cannot live in ConfigMaps.
# In local dev these are plain k8s Secrets (no Vault).
#
# The OIDC secret (ol-mitlearn-oidc) is created by the Pulumi infra stack
# (local_dev_keycloak.py) and should NOT be created here to avoid conflicts.
#
# Fill in OPENAI_API_KEY and LITELLM_API_KEY if you want AI features enabled.
apiVersion: v1
kind: Secret
metadata:
  name: mitlearn-secrets
  namespace: mit-learn
type: Opaque
stringData:
  # ── Database ───────────────────────────────────────────────────────────────
  # Format: postgres://<user>:<password>@<host>:<port>/<db>
  # Password matches the pg-app-credentials Secret created by the Pulumi infra stack.
  DATABASE_URL: "postgres://app:localdev@local-pg-rw.local-infra.svc.cluster.local:5432/mitlearn"  # pragma: allowlist secret

  # ── Valkey ─────────────────────────────────────────────────────────────────
  CELERY_BROKER_URL: "redis://valkey.local-infra.svc.cluster.local:6379/0"
  REDISCACHE_URL: "redis://valkey.local-infra.svc.cluster.local:6379/1"
  REDIS_URL: "redis://valkey.local-infra.svc.cluster.local:6379/1"
  CELERY_RESULT_BACKEND: "redis://valkey.local-infra.svc.cluster.local:6379/2"

  # ── OIDC client secret ────────────────────────────────────────────────────
  # Set by Pulumi (ol-mitlearn-oidc secret in mit-learn namespace).
  # If running without Pulumi, populate this manually.
  SOCIAL_AUTH_OL_OIDC_SECRET: "local-dev-mitlearn-secret"  # pragma: allowlist secret

  # ── LiteLLM / OpenAI ──────────────────────────────────────────────────────
  OPENAI_API_KEY: ""
  LITELLM_API_KEY: ""

  # ── Django secret key ─────────────────────────────────────────────────────
  SECRET_KEY: "local-dev-secret-key-not-for-production"  # pragma: allowlist secret
  UNSUBSRIBE_SECRET_KEY: "local-dev-mitxonline-insecure-unsubscribe-secret-key" # pragma: allowlist secret

  # ── Misc optional secrets ─────────────────────────────────────────────────
  # Required only if running EDX/YouTube ETL pipelines:
  EDX_API_CLIENT_ID: ""
  EDX_API_CLIENT_SECRET: ""
  YOUTUBE_DEVELOPER_KEY: ""
  GITHUB_ACCESS_TOKEN: ""

  # ── Mailgun ───────────────────────────────────────────────────────────────
  # Required by settings.py even when using SMTP. Stub value — Mailpit
  # handles all outbound email in local dev, Mailgun is never called.
  MAILGUN_KEY: "local-dev-mailgun-stub"  # pragma: allowlist secret
