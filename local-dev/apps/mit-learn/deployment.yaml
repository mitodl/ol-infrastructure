# ─────────────────────────────────────────────────────────────
# Service (ClusterIP) — web
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mitlearn-webapp
  namespace: mit-learn
  labels:
    app: mitlearn
    component: webapp
spec:
  selector:
    app: mitlearn
    component: webapp
  ports:
  - name: http
    port: 8060
    targetPort: http
