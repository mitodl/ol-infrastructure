---
# Builds and publishes mitodl/ol-python-base:{3.11,3.12,3.13} to DockerHub
# whenever dockerfiles/ol-python-base/Dockerfile changes on main.
#
# Register / update with:
#   fly -t <target> set-pipeline \
#       -p ol-python-base-docker \
#       -c pipelines/infrastructure/ol_python_base_docker.yaml
#
# Credentials are resolved from Vault via ((dockerhub.username)) / ((dockerhub.password)).

resources:

- name: ol-infrastructure
  type: git
  icon: github
  source:
    uri: https://github.com/mitodl/ol-infrastructure
    branch: main
    paths:
    - dockerfiles/ol-python-base/Dockerfile

- name: ol-python-base-311-image
  type: registry-image
  icon: docker
  source:
    repository: mitodl/ol-python-base
    tag: "3.11"
    username: ((dockerhub.username))
    password: ((dockerhub.password))

- name: ol-python-base-312-image
  type: registry-image
  icon: docker
  source:
    repository: mitodl/ol-python-base
    tag: "3.12"
    username: ((dockerhub.username))
    password: ((dockerhub.password))

- name: ol-python-base-313-image
  type: registry-image
  icon: docker
  source:
    repository: mitodl/ol-python-base
    tag: "3.13"
    username: ((dockerhub.username))
    password: ((dockerhub.password))

jobs:

- name: build-and-publish-3.11
  public: true
  plan:
  - get: ol-infrastructure
    trigger: true
  - task: build-image
    privileged: true
    config:
      platform: linux
      image_resource:
        type: registry-image
        source:
          repository: vito/oci-build-task
      inputs:
      - name: ol-infrastructure
      outputs:
      - name: image
      run:
        path: build
      params:
        CONTEXT: ol-infrastructure/dockerfiles/ol-python-base
        BUILD_ARG_PYTHON_VERSION: "3.11"
  - put: ol-python-base-311-image
    params:
      image: image/image.tar

- name: build-and-publish-3.12
  public: true
  plan:
  - get: ol-infrastructure
    trigger: true
  - task: build-image
    privileged: true
    config:
      platform: linux
      image_resource:
        type: registry-image
        source:
          repository: vito/oci-build-task
      inputs:
      - name: ol-infrastructure
      outputs:
      - name: image
      run:
        path: build
      params:
        CONTEXT: ol-infrastructure/dockerfiles/ol-python-base
        BUILD_ARG_PYTHON_VERSION: "3.12"
  - put: ol-python-base-312-image
    params:
      image: image/image.tar

- name: build-and-publish-3.13
  public: true
  plan:
  - get: ol-infrastructure
    trigger: true
  - task: build-image
    privileged: true
    config:
      platform: linux
      image_resource:
        type: registry-image
        source:
          repository: vito/oci-build-task
      inputs:
      - name: ol-infrastructure
      outputs:
      - name: image
      run:
        path: build
      params:
        CONTEXT: ol-infrastructure/dockerfiles/ol-python-base
        BUILD_ARG_PYTHON_VERSION: "3.13"
  - put: ol-python-base-313-image
    params:
      image: image/image.tar
