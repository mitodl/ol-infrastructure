---
# Grafana Cloud credentials for the Production stack.
# Fill in values, then encrypt in-place:
#   sops --encrypt --in-place src/bridge/secrets/grafana_cloud/api.production.yaml
#
# grafana_url: Grafana instance URL, e.g. https://mitodl.grafana.net
# grafana_api_token: Service account token with Admin role (Editor minimum for alerting)
# grafana_sm_url: Synthetic Monitoring API URL from the SM plugin config page
# grafana_sm_access_token: SM access token from Grafana Cloud portal (grafana.net)
grafana_url: https://your-production-stack.grafana.net
grafana_api_token: REPLACE_ME
grafana_sm_url: https://synthetic-monitoring-api.grafana.net
grafana_sm_access_token: REPLACE_ME
rootly_bearer_token: REPLACE_ME
slack_notifications_ocw_misc_api_url: REPLACE_ME
