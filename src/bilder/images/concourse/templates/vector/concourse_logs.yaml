---
sources:
  collect_concourse_logs:
    type: journald
    include_units:
    - concourse
    - concourse-worker-spot-watch
    - concourse-worker-lifecycle-hook
    - concourse-worker-reaper

transforms:
  parse_concourse_logs:
    type: remap
    inputs:
    - 'collect_concourse_logs'
    source: |
      event, err = parse_json(.message)
      if event != null {
        .,err = merge(., event)
        .@timestamp = .timestamp
        .labels = ["concourse", "${ENVIRONMENT}"]
        .environment = "${ENVIRONMENT}"
      }

  drop_unwanted_logs:
    type: remap
    inputs:
    - "parse_concourse_logs"
    source: |
      # For the concourse process itself, drop INFO to reduce volume —
      # but keep all logs from the worker drain helper services since they
      # are low-volume and operationally critical.
      is_concourse_service = (._SYSTEMD_UNIT == "concourse.service")
      if is_concourse_service {
        abort_match_info, err = (match_any(.level, [r'info']))
        if abort_match_info {
          abort
        }
      }

  enrich_concourse_logs:
    type: aws_ec2_metadata
    inputs:
    - 'drop_unwanted_logs'
    namespace: ec2

sinks:
  ship_concourse_logs_to_grafana_cloud:
    inputs:
    - 'enrich_concourse_logs'
    type: loki
    auth:
      strategy: basic
      password: ${GRAFANA_CLOUD_API_KEY}
      user: "${GRAFANA_CLOUD_LOKI_API_USER-loki}"
    endpoint: https://logs-prod-us-central1.grafana.net
    encoding:
      codec: json
    labels:
      environment: ${ENVIRONMENT}
      application: concourse
      service: concourse
    out_of_order_action: rewrite_timestamp
