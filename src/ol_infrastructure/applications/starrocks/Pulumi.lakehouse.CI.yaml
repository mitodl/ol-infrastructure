---
secretsprovider: awskms://alias/infrastructure-secrets-ci
config:
  starrocks:domain: lakehouse.ci.starrocks.ol.mit.edu
  vault:address: https://vault-ci.odl.mit.edu
  vault_server:env_namespace: operations.ci
  # OIDC and Iceberg data-lake integration are intentionally disabled for CI:
  # this cluster only needs to exist so ol-analytics-api's CI deploy can reach
  # a real StarRocks FE over Vault dynamic credentials, not serve real queries.
  starrocks:oidc_enabled: "false"
  starrocks:enable_data_lake_integration: "false"
  starrocks:fe_config:
    replicas: 1
    cpu_request: 2000m
    memory_request: 4Gi
    memory_limit: 4Gi
    jvm_heap_mb: 3072
    storage: 20Gi
    log_storage: 20Gi
  starrocks:use_be: "false"
  starrocks:use_cn: "true"
  starrocks:cn_config:
    min_replicas: 1
    max_replicas: 1
    cpu_request: 1000m
    memory_request: 2Gi
    memory_limit: 2Gi
  starrocks:ssl_enabled: "false"
  starrocks:ssl_force_secure_transport: "false"
