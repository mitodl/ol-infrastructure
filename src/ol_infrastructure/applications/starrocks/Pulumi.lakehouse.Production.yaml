---
# secretsprovider and encryptedkey will be populated on first `pulumi stack init`
# Root password must be set encrypted: pulumi config set --secret starrocks:root_password
secretsprovider: awskms://alias/infrastructure-secrets-production
config:
  starrocks:domain: lakehouse.starrocks.ol.mit.edu
  vault:address: https://vault-production.odl.mit.edu
  vault_server:env_namespace: operations.production
  starrocks:root_password:
    secure: v1:MXN6eaFDcXOtWfo8:JMrltk28ycvV6h6tG/8eiTOSkIBUBoxlshNtocbb0AJ7GCFgVdjkuf+XWUrKZOe+on8Vmip2e7Q= # set with: pulumi config set --secret starrocks:root_password
  starrocks:oidc_enabled: "true"
  starrocks:fe_config:
    replicas: 3
    cpu_request: 8000m
    memory_request: 24Gi
    memory_limit: 24Gi
    # 75% of 24Gi container limit = 18Gi heap, leaving ~6Gi for JVM non-heap.
    # 16Gi / 12Gi heap was insufficient — live heap set reached 10Gi causing
    # constant G1GC mark cycles that stole CPU and timed out the 1s liveness
    # probe. Ref: https://docs.starrocks.io/docs/faq/fe_mem_faq/
    jvm_heap_mb: 18432
    # Raise optimizer timeout to tolerate slow AWS Glue metadata responses.
    # StarRocks default is 3000 ms.
    planner_optimize_timeout_ms: 30000
    storage: 100Gi
    log_storage: 100Gi
  starrocks:use_be: "false"
  starrocks:be_config:
    replicas: 3
    cpu_request: 16000m
    memory_request: 32Gi
    memory_limit: 32Gi
    storage: 1Ti
    log_storage: 100Gi
  starrocks:use_cn: "true"
  starrocks:cn_config:
    min_replicas: 2
    max_replicas: 20
    cpu_target_utilization_percentage: 80
    cpu_request: 16000m
    memory_request: 32Gi
    memory_limit: 32Gi
  starrocks:enable_data_lake_integration: "true"
  starrocks:ssl_enabled: "true"
  # ssl_force_secure_transport is intentionally false: the StarRocks operator
  # (chart 1.11.4) does not support TLS for its internal FE MySQL connections.
  # Re-enable once operator PR #732 merges and the chart version is bumped.
  # External clients (Vault, Superset) already use --ssl / tls=skip-verify.
  starrocks:ssl_force_secure_transport: "false"
  starrocks:ssl_keystore_password:
    secure: v1:h7Hv+CSf6Hhk1mVg:Il+DfHH3nUPLk+SZFSQJwOfwt7h+Ses5dBlUYi3byc59bMaVNFVXsoaft1T9+g8cTLhPcGRazE8=
