  # Coraza WAF spike (ol-infrastructure#5101) -- pre-production only,
  # low-risk long-horizon soak test before considering it for production.
  # wasm.enabled loads the coraza-filter plugin globally but nothing
  # routes through it yet, so this has no effect on live traffic.
  eks:apisix_custom_image_repository: mitodl/apisix-waf
  eks:apisix_custom_image_tag: latest
  eks:apisix_wasm_plugins:
  - name: coraza-filter
    priority: 7999
    file: /usr/local/apisix/coraza-filter.wasm
  eks:developer_role_policy_name: AmazonEKSClusterAdminPolicy
  eks:developer_role_kubernetes_groups:
  - admin
  eks:developer_role_scope: cluster
  eks:ebs_csi_provisioner: 'true'
  eks:efs_csi_provisioner: 'true'
  eks:gateway_release_channel: experimental
  eks:namespaces:
  - digital-credentials
  - jupyter
  - jupyter-authoring
  - kubewatch
  - learn-ai
  - micromasters
  - mitlearn
  - mitxonline
  - mitxonline-openedx
  - ocw-studio
  - odl-video-service
  - tika
  - xpro
  - xpro-openedx
  eks:nodegroups:
    worker-xlarge:
      disk_size_gb: 1000
      instance_type: m8i-flex.2xlarge
      labels:
        node_size: m8i-flex.2xlarge
        ondemand: true
        ol.mit.edu/core_node: true
        ol.mit.edu/gpu_node: false
      node_group_options: {}
      scaling:
        desired: 4
        max: 6
        min: 3
      tags:
        cluster: applications-qa
      taints: {}
      version:
    gpu-worker-xlarge:
      disk_size_gb: 1000
      instance_type: g4dn.xlarge
      gpu: true
      labels:
        node_size: g4dn.xlarge
        ondemand: true
        ol.mit.edu/core_node: false
        ol.mit.edu/gpu_node: true
      node_group_options: {}
      scaling:
        desired: 1
        max: 2
        min: 1
      tags:
        cluster: applications-qa
        gpu: 'true'
      taints:
        ol.mit.edu/gpu_node:
          value: 'true'
          effect: NoSchedule
      version:
  environment:business_unit: operations
  environment:target_vpc: applications_vpc
